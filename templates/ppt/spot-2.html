<div class="spot" id="spot-2" style="width: 1900px; height: 950px; background: transparent; overflow: hidden;">
    <!-- [SVG ROAD] 4-Way Soft Fade Integration -->
    <svg viewBox="0 0 1900 1300" style="position: absolute; top: 0; left: 0; width: 100%; height: 1300px; z-index: 5;"
        preserveAspectRatio="none">

        <defs>
            <!-- 4방향 부드러운 원형 그라데이션 마스크 (하단 잘림 완전 해결) -->
            <radialGradient id="road-fade-radial" cx="50%" cy="40%" r="65%">
                <stop offset="40%" stop-color="white" />
                <stop offset="85%" stop-color="rgba(255,255,255,0.2)" />
                <stop offset="100%" stop-color="transparent" />
            </radialGradient>

            <mask id="road-mask-smooth">
                <rect x="-100" y="-100" width="2100" height="1500" fill="url(#road-fade-radial)" />
            </mask>

            <!-- 테두리 블러 필터 -->
            <filter id="soft-edge" x="-40%" y="-40%" width="180%" height="180%">
                <feGaussianBlur in="SourceGraphic" stdDeviation="4" />
            </filter>

            <!-- 깊이와 입체감을 위한 그림자 필터 -->
            <filter id="road-depth" x="-40%" y="-40%" width="180%" height="180%">
                <feDropShadow dx="0" dy="10" stdDeviation="15" flood-color="rgba(255,140,0,0.15)" />
            </filter>
        </defs>

        <!-- 전체적으로 자연스럽게 흐려지는 방사형 마스크 적용 -->
        <g mask="url(#road-mask-smooth)">
            <!-- Outer soft glow -->
            <path d="M -100,0 Q 950,1500 2000,0" fill="none" stroke="rgba(255, 140, 0, 0.05)" stroke-width="240"
                stroke-linecap="round" filter="url(#soft-edge)" />

            <!-- Road Body -->
            <path d="M -100,0 Q 950,1500 2000,0" fill="none" stroke="rgba(255, 255, 255, 0.9)" stroke-width="170"
                stroke-linecap="round" filter="url(#road-depth)" />

            <!-- Center Dashed Line -->
            <path d="M -100,0 Q 950,1500 2000,0" fill="none" stroke="rgba(255, 152, 0, 0.8)" stroke-width="6"
                stroke-dasharray="35 25" stroke-linecap="round" />
        </g>
    </svg>

    <!-- PPT Headers -->
    <h2
        style="font-size: 11.5rem; font-weight: 900; color: #ff9800; opacity: 0.04; position: absolute; z-index: 3; top: 10px; left: 80px; margin:0; letter-spacing: 5px;">
        COMPOSITION</h2>
    <h2
        style="font-size: 6rem; font-weight: 800; color: #1e293b; position: absolute; top: 100px; left: 0; width: 100%; text-align: center; margin: 0; z-index: 10;">
        프레젠테이션 <span style="color: #ff7a1a; text-shadow: 0 4px 15px rgba(255,122,26,0.3);">구성</span>
    </h2>

    <!-- 페이지 인디케이터 (Hover 시 표시) -->
    <div id="ph-page-indicator"
        style="position: absolute; top: 260px; left: 0; width: 100%; text-align: center; z-index: 15; opacity: 0; transform: translateY(-10px); transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none;">
        <span
            style="display: inline-flex; align-items: center; gap: 12px; background: rgba(255, 255, 255, 0.95); border: 2.5px solid rgba(255, 122, 26, 0.6); color: #e65c00; padding: 12px 35px; border-radius: 50px; font-size: 2.1rem; font-weight: 900; box-shadow: 0 10px 25px rgba(255, 122, 26, 0.15); backdrop-filter: blur(5px);">
            <i class="bi bi-file-earmark-slides-fill"></i> <span id="ph-page-text">4p ~ 5p</span>
        </span>
    </div>

    <!-- [ABSOLUTE POTHOLES] Resynced -->
    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20;">
        <div class="ph-w1" style="position: absolute; left: 110px; top: 277px;" onmouseenter="showPhPage('4p ~ 5p')"
            onmouseleave="hidePhPage()">
            <div class="ph-hole"><span class="num" style="color:#ffca28;">01</span><i class="bi bi-lightbulb-fill"
                    style="color: #ffca28;"></i><span class="txt">개발 배경</span></div>
        </div>
        <div class="ph-w2" style="position: absolute; left: 404px; top: 511px;" onmouseenter="showPhPage('6p ~ 8p')"
            onmouseleave="hidePhPage()">
            <div class="ph-hole"><span class="num" style="color:#42a5f5;">02</span><i class="bi bi-stack"
                    style="color: #42a5f5;"></i><span class="txt">기술 스택</span></div>
        </div>
        <div class="ph-w3" style="position: absolute; left: 698px; top: 626px;" onmouseenter="showPhPage('9p ~ 11p')"
            onmouseleave="hidePhPage()">
            <div class="ph-hole"><span class="num" style="color:#7986cb;">03</span><i class="bi bi-diagram-3-fill"
                    style="color: #7986cb;"></i><span class="txt">아키텍쳐</span></div>
        </div>
        <div class="ph-w4" style="position: absolute; left: 992px; top: 624px;" onmouseenter="showPhPage('12p ~ 14p')"
            onmouseleave="hidePhPage()">
            <div class="ph-hole"><span class="num" style="color:#ab47bc;">04</span><i class="bi bi-robot"
                    style="color: #ab47bc;"></i><span class="txt">AI 모델</span></div>
        </div>
        <div class="ph-w5" style="position: absolute; left: 1286px; top: 505px;" onmouseenter="showPhPage('15p ~ 19p')"
            onmouseleave="hidePhPage()">
            <div class="ph-hole"><span class="num" style="color:#ff7043;">05</span><i class="bi bi-play-circle-fill"
                    style="color: #ff7043;"></i><span class="txt">핵심 서비스</span></div>
        </div>
        <div class="ph-w6" style="position: absolute; left: 1580px; top: 267px;" onmouseenter="showPhPage('20p ~ 21p')"
            onmouseleave="hidePhPage()">
            <div class="ph-hole"><span class="num" style="color:#ef5350;">06</span><i class="bi bi-flag-fill"
                    style="color: #ef5350;"></i><span class="txt">향후 목표</span></div>
        </div>
    </div>
</div>

<script>
    function showPhPage(text) {
        document.getElementById('ph-page-text').innerText = text;
        let ind = document.getElementById('ph-page-indicator');
        ind.style.opacity = '1';
        ind.style.transform = 'translateY(0)';
    }
    function hidePhPage() {
        let ind = document.getElementById('ph-page-indicator');
        ind.style.opacity = '0';
        ind.style.transform = 'translateY(-10px)';
    }
</script>
